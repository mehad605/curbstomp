name: 🚀 Build & Release Curbstomp

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version_number:
        description: 'Release version (e.g. v1.0.0)'
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: 🧪 Lint & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: ⬇️ Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: ⚙️ Set up JDK 17
        uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00 # v4.7.1
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🐘 Setup Gradle
        uses: gradle/actions/setup-gradle@d9c87d481d55275bb5441eef3fe0e46805f9ef70 # v3.5.0
        with:
          cache-read-only: ${{ github.event_name != 'push' }}

      - name: 🔍 Run Lint
        run: ./gradlew lint --no-daemon -Dorg.gradle.jvmargs="-Xmx4g -XX:+UseParallelGC"

      - name: 🧪 Run Unit Tests
        run: ./gradlew test --no-daemon -Dorg.gradle.jvmargs="-Xmx4g -XX:+UseParallelGC"

  release:
    name: 📦 Build & Release
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: ⬇️ Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: ⚙️ Set up JDK 17
        uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00 # v4.7.1
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🐘 Setup Gradle
        uses: gradle/actions/setup-gradle@d9c87d481d55275bb5441eef3fe0e46805f9ef70 # v3.5.0
        with:
          cache-read-only: true

      - name: 🏷️ Determine Version
        id: version
        env:
          INPUT_VERSION: ${{ github.event.inputs.version_number }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RAW_VER="$INPUT_VERSION"
          else
            RAW_VER="${GITHUB_REF_NAME}"
          fi
          
          CLEAN_VER="${RAW_VER#v}"
          IFS='.' read -r major minor patch <<< "$CLEAN_VER"
          VERSION_CODE=$(( major * 10000 + minor * 100 + patch ))

          echo "VERSION=$RAW_VER" >> $GITHUB_ENV
          echo "CLEAN_VERSION=$CLEAN_VER" >> $GITHUB_ENV
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_ENV

      - name: 🔐 Decode Keystore
        uses: timheuer/base64-to-file@ca9e30baf83f7f26708fb0059af9a0973fe5f27e # v1.2.4
        id: keystore
        with:
          fileName: 'signing-key.jks'
          encodedString: ${{ secrets.SIGNING_KEY }}

      - name: 🛠️ Build Release APK
        env:
          KEYSTORE_PATH: ${{ steps.keystore.outputs.filePath }}
          KEYSTORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease \
            --build-cache \
            --no-daemon \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:+UseParallelGC" \
            -Dkotlin.compiler.execution.strategy="in-process" \
            -PVERSION_NAME="${{ env.CLEAN_VERSION }}" \
            -PVERSION_CODE="${{ env.VERSION_CODE }}"

      - name: 📦 Rename Artifact
        run: |
          APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" | head -n 1)
          mv "$APK_PATH" ./Curbstomp-${{ env.VERSION }}.apk

      - name: 📝 Generate SHA-256 Checksums
        run: |
          sha256sum Curbstomp-*.apk > SHA256SUMS.txt

      - name: 🛡️ Attest Build Provenance
        uses: actions/attest-build-provenance@c074443f1aee8d4aeeae555aebba3282517141b2 # v1.4.3
        with:
          subject-path: 'Curbstomp-*.apk'

      - name: 🚀 Publish GitHub Release
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda # v2.2.1
        with:
          tag_name: ${{ env.VERSION }}
          name: Release ${{ env.VERSION }}
          generate_release_notes: true
          draft: false
          prerelease: false
          files: |
            Curbstomp-${{ env.VERSION }}.apk
            SHA256SUMS.txt
